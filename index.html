<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gitadora Finder</title>

<style>
body{
 background:#111;
 color:white;
 text-align:center;
 font-family:sans-serif;
}

img{
 max-width:90%;
 margin-top:20px;
}

#status{
 margin:20px;
 font-size:18px;
}
</style>

</head>

<body>

<h2>画像検索</h2>

<input type="file" id="file">
<div id="status">待機中</div>

<img id="result">

<script>

const START=47
const END=1475
const SIZE=32

function pad(n){
 return n.toString().padStart(5,"0")
}

function circleMask(data,w,h){

 const cx=w/2
 const cy=h/2
 const r=w/2

 for(let y=0;y<h;y++){
  for(let x=0;x<w;x++){

   const dx=x-cx
   const dy=y-cy

   if(dx*dx+dy*dy>r*r){

    const i=(y*w+x)*4

    data[i]=0
    data[i+1]=0
    data[i+2]=0

   }

  }
 }

}

function feature(img){

 const canvas=document.createElement("canvas")
 canvas.width=SIZE
 canvas.height=SIZE

 const ctx=canvas.getContext("2d")

 ctx.filter="blur(4px)"
 ctx.drawImage(img,0,0,SIZE,SIZE)
 ctx.filter="none"

 const imgData=ctx.getImageData(0,0,SIZE,SIZE)

 circleMask(imgData.data,SIZE,SIZE)

 return imgData.data
}

function diff(a,b){

 let d=0

 for(let i=0;i<a.length;i+=4){

  d+=Math.abs(a[i]-b[i])
  d+=Math.abs(a[i+1]-b[i+1])
  d+=Math.abs(a[i+2]-b[i+2])

 }

 return d
}

function loadImage(src){

 return new Promise(res=>{

  const img=new Image()

  img.onload=()=>res(img)
  img.onerror=()=>res(null)

  img.src=src

 })

}

document.getElementById("file").onchange=async e=>{

 const file=e.target.files[0]

 if(!file) return

 const url=URL.createObjectURL(file)

 const inputImg=new Image()

 inputImg.onload=async()=>{

  const inputFeature=feature(inputImg)

  let bestScore=1e20
  let bestFile=null

  for(let i=START;i<=END;i++){

   const name=pad(i)+".png"

   document.getElementById("status").innerText="検索中 "+name

   const img=await loadImage("images/"+name)

   if(!img) continue

   const f=feature(img)

   const score=diff(inputFeature,f)

   if(score<bestScore){

    bestScore=score
    bestFile=name

   }

  }

  document.getElementById("status").innerText="結果 "+bestFile

  document.getElementById("result").src="images/"+bestFile

 }

 inputImg.src=url

}

</script>

</body>
</html>
